services:
  frontend:
    build:
      context: ./Pletor-canvas/frontend
      dockerfile: Dockerfile
    ports:
      - "3080:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./Pletor-canvas/backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=file:./data/pletor.db
      - PORT=8080
      - HOST=0.0.0.0
      - CORS_ORIGIN=http://localhost:3080
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

volumes:
  backend-data:
