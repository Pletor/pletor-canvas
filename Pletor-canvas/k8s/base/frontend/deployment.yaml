apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pletor
  labels:
    app: pletor
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pletor
      component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: pletor
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/pletor/pletor-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
