apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pletor-ingress
  namespace: pletor
  annotations:
    # Lokálně nepotřebujeme TLS ani cert-manager
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  # Bez TLS — HTTP only lokálně
  rules:
    - host: localhost
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
