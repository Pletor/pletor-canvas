name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/pletor

jobs:
  # === Kvalita kódu — Backend ===
  quality-backend:
    name: Backend Lint + Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check app/
      - run: ruff format --check app/

  # === Kvalita kódu — Frontend ===
  quality-frontend:
    name: Frontend Lint + Types
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # === Backend testy ===
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest --tb=short -q

  # === Frontend testy ===
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test

  # === Docker build + push ===
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [quality-backend, quality-frontend, test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - context: backend
            image: backend
          - context: frontend
            image: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # === Deploy staging ===
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to staging
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          cd k8s/overlays/staging
          kustomize edit set image \
            ghcr.io/pletor/pletor-frontend=ghcr.io/${{ env.IMAGE_PREFIX }}-frontend:${IMAGE_TAG} \
            ghcr.io/pletor/pletor-backend=ghcr.io/${{ env.IMAGE_PREFIX }}-backend:${IMAGE_TAG}
          kubectl apply -k .
          kubectl rollout status deployment/frontend -n pletor-staging --timeout=120s
          kubectl rollout status deployment/backend -n pletor-staging --timeout=120s

  # === Deploy production (manuální schválení) ===
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy to production
        run: |
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          cd k8s/overlays/production
          kustomize edit set image \
            ghcr.io/pletor/pletor-frontend=ghcr.io/${{ env.IMAGE_PREFIX }}-frontend:${IMAGE_TAG} \
            ghcr.io/pletor/pletor-backend=ghcr.io/${{ env.IMAGE_PREFIX }}-backend:${IMAGE_TAG}
          kubectl apply -k .
          kubectl rollout status deployment/frontend -n pletor --timeout=180s
          kubectl rollout status deployment/backend -n pletor --timeout=180s
