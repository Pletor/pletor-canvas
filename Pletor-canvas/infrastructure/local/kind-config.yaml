kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

name: pletor

nodes:
  # Control plane — řídí cluster
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    # Port mapping: kontejner → host
    # Port 80/443 na Windows vyžaduje admin → mapujeme na 8080/8443
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP

  # Worker node — spouští aplikaci
  - role: worker
