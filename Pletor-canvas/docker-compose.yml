services:
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: "postgresql+asyncpg://pletor:pletor@db:5432/pletor"
      HOST: "0.0.0.0"
      PORT: "8080"
      CORS_ORIGIN: "http://localhost:3000"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      WORKFLOWY_API_KEY: "${WORKFLOWY_API_KEY:-}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pletor
      POSTGRES_PASSWORD: pletor
      POSTGRES_DB: pletor
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pletor"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
